name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-matrix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            variant: lite
          - os: macos-latest
            target: aarch64-apple-darwin
            variant: full
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            variant: lite
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            variant: lite
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install backend deps
        run: uv sync --all-extras

      - name: Install frontend deps
        run: cd apps/desktop && npm ci

      - name: Build (${{ matrix.variant }})
        run: |
          if [ "${{ matrix.variant }}" = "full" ]; then
            make build-full
          else
            make build-lite
          fi
        shell: bash
        env:
          BUNDLE_PROFILE: ${{ matrix.variant }}

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-assets
          find apps/desktop/src-tauri/target/release/bundle -type f \
            \( -name '*.dmg' -o -name '*.msi' -o -name '*-setup.exe' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \) \
            -print0 | while IFS= read -r -d '' f; do
              base=$(basename "$f")
              cp "$f" "release-assets/primeclip-${{ matrix.variant }}-${{ matrix.target }}-${base}"
            done
          ls -la release-assets/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: primeclip-${{ matrix.variant }}-${{ matrix.target }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    needs: build-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: primeclip-*
          path: dist
          merge-multiple: true

      - name: Generate changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1 || true)
          {
            echo "## PrimeClip ${TAG}"
            echo
            if [ -n "$PREV" ]; then
              echo "### Changes since ${PREV}"
            else
              echo "### Initial release"
            fi
            echo
            if [ -n "$PREV" ]; then
              git log "${PREV}..${TAG}" --pretty=format:"- %s (%h)" --no-merges
            else
              git log --pretty=format:"- %s (%h)" --no-merges
            fi
          } > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PrimeClip ${{ github.ref_name }}
          body_path: release-notes.md
          files: dist/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
